<svg width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="130" cy="130" r="95" fill="#68548F" stroke="#282828" stroke-width="2.5"/>
  <!-- Inner ring -->
  <circle cx="130" cy="130" r="78" fill="#ECECEC" stroke="#282828" stroke-width="1.8"/>
  <!-- Inner face -->
  <circle cx="130" cy="130" r="72" fill="#F5F3F8"/>

  <!-- Cardinal tick marks -->
  <line x1="130" y1="58" x2="130" y2="72" stroke="#282828" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="130" y1="188" x2="130" y2="202" stroke="#282828" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="130" x2="72" y2="130" stroke="#282828" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="188" y1="130" x2="202" y2="130" stroke="#282828" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Minor tick marks -->
  <line x1="80.2" y1="80.2" x2="89.1" y2="89.1" stroke="#282828" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="170.9" y1="80.2" x2="162" y2="89.1" stroke="#282828" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80.2" y1="179.8" x2="89.1" y2="170.9" stroke="#282828" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="170.9" y1="179.8" x2="162" y2="170.9" stroke="#282828" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cardinal letters -->
  <text x="130" y="50" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#282828">N</text>
  <text x="130" y="217" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#282828">S</text>
  <text x="43" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#282828">W</text>
  <text x="217" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#282828">E</text>

  <!-- Needle - North (purple) -->
  <polygon points="130,70 120,130 140,130" fill="#68548F" stroke="#282828" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Needle - South (light) -->
  <polygon points="130,190 120,130 140,130" fill="#ECECEC" stroke="#282828" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Needle highlight -->
  <polygon points="130,78 126,130 130,128" fill="#FCFCFC" opacity="0.5"/>

  <!-- Center pin -->
  <circle cx="130" cy="130" r="6" fill="#68548F" stroke="#282828" stroke-width="1.8"/>
  <circle cx="130" cy="130" r="2.5" fill="#FCFCFC"/>

  <!-- Outer ring decoration dots -->
  <circle cx="130" cy="28" r="3" fill="#FCFCFC" opacity="0.6"/>
  <circle cx="232" cy="130" r="2.5" fill="#FCFCFC" opacity="0.4"/>
  <circle cx="28" cy="130" r="2.5" fill="#FCFCFC" opacity="0.4"/>
  <circle cx="130" cy="232" r="2.5" fill="#FCFCFC" opacity="0.4"/>
</svg>
